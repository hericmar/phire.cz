<div class="center container">
    <div class="avatar-container">
        <img class="avatar" src="{{ .Site.Params.avatar }}" alt="{{ path.Base .Site.Params.avatar }}">
    </div>
    <div class="content-container">
        <div>
            <h1>{{ .Site.Params.author }}</h1>
            <p>{{ .Site.Params.brief }}</p>
        </div>
        <div>
            <a class="icon" title="Email" href="mailto:{{ .Site.Params.email }}" target="_blank" rel="noopener me">
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor" d="M20,8L12,13L4,8V6L12,11L20,6M20,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6C22,4.89 21.1,4 20,4Z" />
                </svg>
            </a> 
            <a class="icon" title="GPG" href="{{ .Site.Params.keys }}">
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor" d="M7 14C5.9 14 5 13.1 5 12S5.9 10 7 10 9 10.9 9 12 8.1 14 7 14M12.6 10C11.8 7.7 9.6 6 7 6C3.7 6 1 8.7 1 12S3.7 18 7 18C9.6 18 11.8 16.3 12.6 14H16V18H20V14H23V10H12.6Z" />
                </svg>
            </a>
        </div>
    </div>
</div>
